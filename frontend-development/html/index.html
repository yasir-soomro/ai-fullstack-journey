<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/style.css">    <title>Developer Survey Form</title>
</head>
<body>

    <header class="site-header">
        <div class="container">
            <h1>Developer Survey</h1>
            <p class="lead">We appreciate your time — your feedback helps improve developer tools and learning resources.</p>
        </div>
    </header>

    <main class="container">
        <form action="#" method="post" class="survey-form" novalidate>

            <fieldset>
                <legend>Personal Information</legend>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Full name</label>
                        <input type="text" id="name" name="name" placeholder="Jane Doe" required aria-required="true">
                    </div>

                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required aria-required="true">
                    </div>

                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" min="13" max="120" inputmode="numeric">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Professional Details</legend>

                <div class="form-group">
                    <label for="role">Current role</label>
                    <select id="role" name="role">
                        <option value="">Choose a role</option>
                        <option value="student">Student</option>
                        <option value="frontend">Frontend Developer</option>
                        <option value="backend">Backend Developer</option>
                        <option value="fullstack">Full Stack Developer</option>
                        <option value="ai">AI Engineer</option>
                    </select>
                </div>

                <div class="form-group">
                    <span class="label">Experience level</span>
                    <div class="radio-group" role="radiogroup" aria-label="Experience level">
                        <label class="control" for="beginner"><input type="radio" id="beginner" name="experience" value="beginner"> Beginner</label>
                        <label class="control" for="intermediate"><input type="radio" id="intermediate" name="experience" value="intermediate"> Intermediate</label>
                        <label class="control" for="advanced"><input type="radio" id="advanced" name="experience" value="advanced"> Advanced</label>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Skills</legend>

                <p class="label">Select technologies you use</p>
                <div class="checkbox-group">
                    <label class="control" for="html"><input type="checkbox" id="html" name="skills" value="html"> HTML</label>
                    <label class="control" for="css"><input type="checkbox" id="css" name="skills" value="css"> CSS</label>
                    <label class="control" for="javascript"><input type="checkbox" id="javascript" name="skills" value="javascript"> JavaScript</label>
                    <label class="control" for="react"><input type="checkbox" id="react" name="skills" value="react"> React</label>
                    <label class="control" for="nextjs"><input type="checkbox" id="nextjs" name="skills" value="nextjs"> Next.js</label>
                    <label class="control" for="python"><input type="checkbox" id="python" name="skills" value="python"> Python</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Feedback</legend>

                <div class="form-group">
                    <label for="comments">Additional comments</label>
                    <textarea id="comments" name="comments" rows="6" placeholder="Share your thoughts..."></textarea>
                </div>
            </fieldset>

            <div class="buttons">
                <button type="submit" class="btn primary">Submit</button>
                <button type="reset" class="btn secondary">Reset</button>
            </div>

        </form>
    </main>

</body>
</html>
