<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Survey Form</title>
</head>
<body>

    <header>
        <h1>Developer Survey Form</h1>
        <p>Thank you for taking the time to complete this survey.</p>
    </header>

    <main>
        <form action="#" method="post">

            <fieldset>
                <legend>Personal Information</legend>

                <label for="name">Full Name:</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your full name"
                    required
                >

                <br><br>

                <label for="email">Email Address:</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >

                <br><br>

                <label for="age">Age:</label>
                <input
                    type="number"
                    id="age"
                    name="age"
                    min="18"
                    max="100"
                >
            </fieldset>

            <br>

            <fieldset>
                <legend>Professional Details</legend>

                <label for="role">Current Role:</label>
                <select id="role" name="role">
                    <option value="">Select Role</option>
                    <option>Student</option>
                    <option>Frontend Developer</option>
                    <option>Backend Developer</option>
                    <option>Full Stack Developer</option>
                    <option>AI Engineer</option>
                </select>

                <br><br>

                <p>Experience Level:</p>

                <input type="radio" id="beginner" name="experience">
                <label for="beginner">Beginner</label>

                <input type="radio" id="intermediate" name="experience">
                <label for="intermediate">Intermediate</label>

                <input type="radio" id="advanced" name="experience">
                <label for="advanced">Advanced</label>
            </fieldset>

            <br>

            <fieldset>
                <legend>Skills</legend>

                <p>Select Technologies You Use:</p>

                <input type="checkbox" id="html" name="skills">
                <label for="html">HTML</label>

                <input type="checkbox" id="css" name="skills">
                <label for="css">CSS</label>

                <input type="checkbox" id="javascript" name="skills">
                <label for="javascript">JavaScript</label>

                <input type="checkbox" id="react" name="skills">
                <label for="react">React</label>

                <input type="checkbox" id="nextjs" name="skills">
                <label for="nextjs">Next.js</label>

                <input type="checkbox" id="python" name="skills">
                <label for="python">Python</label>
            </fieldset>

            <br>

            <fieldset>
                <legend>Feedback</legend>

                <label for="comments">Additional Comments:</label>
                <br><br>

                <textarea
                    id="comments"
                    name="comments"
                    rows="6"
                    cols="50"
                    placeholder="Share your thoughts..."
                ></textarea>
            </fieldset>

            <br>

            <button type="submit">Submit Survey</button>
            <button type="reset">Reset Form</button>

        </form>
    </main>

</body>
</html>
